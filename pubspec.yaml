
name: reservation_workshop
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+6

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  firebase_core: ^3.13.0
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.1.6

  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0

  flutter_local_notifications: ^17.2.2
  google_fonts: ^6.2.1

  flutter_bloc: ^9.1.1
  shared_preferences: ^2.5.3
  mobile_scanner: ^7.0.1
  http: ^1.2.2
  url_launcher: ^6.3.0
  geolocator: ^11.0.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  easy_localization: ^3.0.7
  change_app_package_name: ^1.5.0
  image_picker: ^1.0.7
  flutter_image_compress: ^2.3.0
  dio: ^5.4.3+1
  video_player: ^2.8.1
  card_swiper: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/translations/
    - assets/videos/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/font/Inter_18pt-Regular.ttf
          weight: 400
        - asset: assets/font/Inter_18pt-Medium.ttf
          weight: 500
        - asset: assets/font/Inter_28pt-SemiBold.ttf
          weight: 600
    - family: Norsal
      fonts:
        - asset: assets/font/alfont_com_Norsal-Medium.otf
          weight: 500

flutter_native_splash:
  android: true
  ios: true
  web: false
  color: "#FFFFFF"
  background_image: assets/images/splash_screen.png

  android_12:
    image: assets/images/splash_screen.png
    icon_background_color: "#FFFFFF"
